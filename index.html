<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Invito Vincenzo & Maria Giovanna</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<section class="hero">
  <button class="seal" id="open">Apri invito</button>
</section>

<section class="overlay" id="overlay">
  <div class="pager">

    <section class="page page-cover">
      <img src="cover.png" class="page-bg" alt="Invito" />
      <div class="overlay-text">
        <h1>Vincenzo<br/>e<br/>Maria Giovanna</h1>
        <p>annunciano con grande gioia<br/>il loro matrimonio</p>
        <p class="date">31 Luglio 2026</p>
      </div>
    </section>

    <section class="page">
      <img src="chiesa.png" class="page-bg" alt="Chiesa" />
      <div class="overlay-text">
        <p>La cerimonia religiosa si terrà presso la</p>
        <h2>Chiesa Maria S.S. Immacolata</h2>
        <p>Ore 10:30</p>
      </div>
    </section>

    <section class="page">
      <img src="gabbiano.png" class="page-bg" alt="Ricevimento" />
      <div class="overlay-text">
        <p>Dopo la cerimonia saremo lieti di proseguire</p>
        <h2>Il Gabbiano</h2>
        <p>Ore 13:30</p>
      </div>
    </section>

  </div>
</section>

<script src="app.js"></script>
</body>
</html>
