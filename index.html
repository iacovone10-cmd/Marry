<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Vincenzo & Maria Giovanna — Invito</title>
  <meta name="theme-color" content="#d8e0ea" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- COVER (Napoli) -->
<section class="cover" aria-label="Copertina">
  <img class="coverImg" src="napoli-illustrated-hero.png" alt="Napoli" />
  <button class="seal" id="open" aria-label="Apri invito">
    <span class="sealWax"></span>
    <span class="sealInner"></span>
    <span class="sealMono">M<br>G<br>V</span>
  </button>
</section>

<!-- DETAILS -->
<section class="overlay" id="overlay" aria-hidden="true">
  <button class="close" id="close" aria-label="Chiudi">✕</button>
  <div class="pager" id="pager" aria-label="Pagine invito">

    <!-- 1) INVITO: immagine intera + nessun testo sopra (così resta identico). -->
    <section class="page" id="p-invito" aria-label="Invito">
      <img class="pageImg" src="invito.png" alt="Invito" />
    </section>

    <!-- 2) CERIMONIA: immagine intera + hotspot Google Maps sul pin -->
    <section class="page" id="p-chiesa" aria-label="Cerimonia">
      <img class="pageImg" src="chiesa.png" alt="Cerimonia" />
      <a class="hotspot pinHot" href="https://maps.app.goo.gl/67K9Auu479Jeb2qx6" target="_blank" rel="noopener" aria-label="Apri Google Maps - Chiesa"></a>
    </section>

    <!-- 3) RICEVIMENTO: immagine intera + hotspot Google Maps sul pin -->
    <section class="page" id="p-gabbiano" aria-label="Ricevimento">
      <img class="pageImg" src="gabbiano.png" alt="Ricevimento" />
      <a class="hotspot pinHot" href="https://maps.app.goo.gl/G45W9W41TLqeAtuK6" target="_blank" rel="noopener" aria-label="Apri Google Maps - Il Gabbiano"></a>
    </section>

    <!-- 4) DONO: immagine intera + hotspot sul regalo -->
    <section class="page" id="p-dono" aria-label="Dono">
      <img class="pageImg" src="dono.png" alt="Dono" />
      <a class="hotspot giftHot" href="https://example.com/lista-nozze" target="_blank" rel="noopener" aria-label="Apri link regalo"></a>
    </section>

    <!-- 5) RSVP: immagine intera + hotspot SI/NO su WhatsApp -->
    <section class="page" id="p-rsvp" aria-label="RSVP">
      <img class="pageImg" src="rsvp.png" alt="RSVP" />
      <a class="hotspot yesHot" href="https://wa.me/393496701639?text=Ciao%2C%20grazie%20per%20l%27invito%2C%20verr%C3%B2%20con%20piacere%21" target="_blank" rel="noopener" aria-label="RSVP Sì su WhatsApp"></a>
      <a class="hotspot noHot" href="https://wa.me/393496701639?text=Ciao%2C%20grazie%20per%20l%27invito%2C%20ma%20non%20potr%C3%B2%20esserci" target="_blank" rel="noopener" aria-label="RSVP No su WhatsApp"></a>
    </section>

  </div>
</section>

<script src="app.js"></script>
</body>
</html>
