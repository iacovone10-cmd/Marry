<!doctype html>
<html lang='it'>
<head>
  <meta charset='utf-8' />
  <meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover' />
  <title>Vincenzo & Maria Giovanna — Invito</title>
  <meta name='theme-color' content='#000000' />
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap' rel='stylesheet'>
  <link rel='stylesheet' href='styles.css' />
</head>
<body>

<section class='cover'>
  <img class='coverImg' src='napoli-illustrated-hero.png' alt='Napoli' />
  <button class='seal' id='open' aria-label='Apri invito'>
    <span class='sealWax'></span>
    <span class='sealInner'></span>
    <span class='sealMono'>M<br>G<br>V</span>
  </button>
  <div class='openFlash' aria-hidden='true'></div>
</section>

<section class='overlay' id='overlay' aria-hidden='true'>
  <button class='close' id='close' aria-label='Chiudi'>✕</button>

  <div class='pager' id='pager'>

    <!-- INVITO: qui deve vedersi intero (no crop) -->
    <section class='page'>
      <div class='frame frameContain'>
        <img class='pageArt pageContain' src='invito.png' alt='Invito' />
      </div>
    </section>

    <!-- CERIMONIA -->
    <section class='page'>
      <div class='frame'>
        <img class='pageArt' src='chiesa.png' alt='Cerimonia' />
        <span class='maskPin' aria-hidden='true'></span>
        <a class='hotspot pinHot' href='https://maps.app.goo.gl/67K9Auu479Jeb2qx6' aria-label='Apri Google Maps - Chiesa'></a>
        <span class='pinVis' aria-hidden='true'></span>
      </div>
    </section>

    <!-- RICEVIMENTO -->
    <section class='page'>
      <div class='frame'>
        <img class='pageArt' src='gabbiano.png' alt='Ricevimento' />
        <span class='maskPin' aria-hidden='true'></span>
        <a class='hotspot pinHot' href='https://maps.app.goo.gl/G45W9W41TLqeAtuK6' aria-label='Apri Google Maps - Il Gabbiano'></a>
        <span class='pinVis' aria-hidden='true'></span>
      </div>
    </section>

    <!-- DONO -->
    <section class='page'>
      <div class='frame'>
        <img class='pageArt' src='dono.png' alt='Dono' />
        <a class='hotspot giftHot' href='https://example.com/lista-nozze' aria-label='Apri link regalo'></a>
      </div>
    </section>

    <!-- RSVP: hotspot invisibili (nessun box aggiunto) -->
    <section class='page'>
      <div class='frame'>
        <img class='pageArt' src='rsvp.png' alt='RSVP' />
        <a class='hotspot yesHot' href='https://api.whatsapp.com/send?phone=393496701639&text=Ciao%2C%20grazie%20per%20l%27invito%2C%20verr%C3%B2%20con%20piacere%21' aria-label='RSVP Sì su WhatsApp'></a>
        <a class='hotspot noHot' href='https://api.whatsapp.com/send?phone=393496701639&text=Ciao%2C%20grazie%20per%20l%27invito%2C%20ma%20non%20potr%C3%B2%20esserci' aria-label='RSVP No su WhatsApp'></a>
      </div>
    </section>

  </div>
</section>

<script src='app.js'></script>
</body>
</html>
