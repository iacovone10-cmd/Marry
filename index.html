<!doctype html>
<html lang='it'>
<head>
  <meta charset='utf-8'/>
  <meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'/>

</head>
<body>

      <img src='invito.png' alt='Invito'/>

    <section class='page'>
      <img src='chiesa.png' alt='Cerimonia'/>
    </section>

    <section class='page'>
      <img src='gabbiano.png' alt='Ricevimento'/>
    </section>

    <section class='page'>
      <img src='dono.png' alt='Dono'/>
    </section>

    <section class='page'>
      <img src='rsvp.png' alt='RSVP'/>
      <a class='hotspot yes' href='https://api.whatsapp.com/send?phone=393496701639&text=Ciao%2C%20grazie%20per%20l%27invito%2C%20verr%C3%B2%20con%20piacere%21'></a>
      <a class='hotspot no' href='https://api.whatsapp.com/send?phone=393496701639&text=Ciao%2C%20grazie%20per%20l%27invito%2C%20ma%20non%20potr%C3%B2%20esserci'></a>
    </section>

<script src='app.js'></script>
</body>
</html>
