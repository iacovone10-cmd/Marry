<!doctype html>
<html lang="it">
<head>

</head>
<body>

  <!-- COVER -->
  <section class="page active" id="cover">

      <img src="Cover.png" class="cover-image" alt="Copertina Napoli" />
      <!-- bottone cliccabile sul sigillo -->
      <button class="seal-hit" type="button" onclick="goNext()" aria-label="Apri invito"></button>

  <!-- PAGINA 1: NOMI + DATA -->

  </section>

    </div>
